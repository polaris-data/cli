name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Determine release tag
        id: ref
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "This workflow must run from a tag push." >&2
            exit 1
          fi

          tag="${GITHUB_REF_NAME}"

          if [[ -z "${tag}" ]]; then
            echo "Release tag is empty." >&2
            exit 1
          fi

          echo "tag=${tag}" >>"${GITHUB_OUTPUT}"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.tag }}

      - name: Validate Cargo version matches tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          tag="${{ steps.ref.outputs.tag }}"

          if [[ -z "${version}" ]]; then
            echo "Could not determine crate version from Cargo.toml." >&2
            exit 1
          fi

          if [[ "${tag}" != "v${version}" ]]; then
            echo "Tag ${tag} does not match Cargo.toml version v${version}." >&2
            exit 1
          fi

          echo "tag=${tag}" >>"${GITHUB_OUTPUT}"
          echo "version=${version}" >>"${GITHUB_OUTPUT}"

      - uses: dtolnay/rust-toolchain@stable

      - name: Run test suite
        run: cargo test

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ needs.validate.outputs.tag }}"
          target="${{ matrix.target }}"
          archive_name="tick-${tag}-${target}.tar.gz"
          build_dir="target/${target}/release"
          package_dir="$(mktemp -d)"
          verify_dir="$(mktemp -d)"
          trap 'rm -rf "${package_dir}" "${verify_dir}"' EXIT

          mkdir -p dist
          cp "${build_dir}/tick" "${package_dir}/tick"
          chmod 0755 "${package_dir}/tick"
          tar -czf "dist/${archive_name}" -C "${package_dir}" tick

          tar -xzf "dist/${archive_name}" -C "${verify_dir}"
          "${verify_dir}/tick" --version

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/tick-${{ needs.validate.outputs.tag }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish:
    needs:
      - validate
      - build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail

          cd dist
          sha256sum tick-${{ needs.validate.outputs.tag }}-*.tar.gz > tick-${{ needs.validate.outputs.tag }}-checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/tick-${{ needs.validate.outputs.tag }}-*.tar.gz
            dist/tick-${{ needs.validate.outputs.tag }}-checksums.txt

name: release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths:
      - 'packages/cli/src/index.ts'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and publish, for example v0.7.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      create_tag: ${{ steps.plan.outputs.create_tag }}
      release_sha: ${{ steps.plan.outputs.release_sha }}
      should_release: ${{ steps.plan.outputs.should_release }}
      source_ref: ${{ steps.plan.outputs.source_ref }}
      tag: ${{ steps.plan.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release plan
        id: plan
        shell: bash
        run: |
          set -euo pipefail

          event_name="${GITHUB_EVENT_NAME}"
          ref_type="${GITHUB_REF_TYPE:-}"
          before_sha="${{ github.event.before }}"

          should_release="false"
          create_tag="false"
          release_sha="${GITHUB_SHA}"
          source_ref="${GITHUB_SHA}"
          tag=""

          read_cli_version() {
            sed -n "s/^const version = '\(.*\)'$/\1/p" packages/cli/src/index.ts | head -n1
          }

          if [[ "${event_name}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
            should_release="true"
          elif [[ "${ref_type}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            should_release="true"
            source_ref="${tag}"
          else
            current_version="$(read_cli_version)"
            previous_version=""

            if [[ -z "${current_version}" ]]; then
              echo "Could not determine CLI version from packages/cli/src/index.ts." >&2
              exit 1
            fi

            if [[ -n "${before_sha}" && "${before_sha}" != "0000000000000000000000000000000000000000" ]]; then
              previous_version="$(
                git show "${before_sha}:packages/cli/src/index.ts" 2>/dev/null \
                  | sed -n "s/^const version = '\(.*\)'$/\1/p" \
                  | head -n1 || true
              )"
            fi

            if [[ "${previous_version}" != "${current_version}" ]]; then
              tag="v${current_version}"
              should_release="true"
              create_tag="true"
            fi
          fi

          if [[ "${should_release}" == "true" ]]; then
            if [[ -z "${tag}" ]]; then
              echo "Release tag is empty." >&2
              exit 1
            fi

            if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Release tag must match vMAJOR.MINOR.PATCH." >&2
              exit 1
            fi

            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              existing_sha="$(git rev-list -n1 "${tag}")"

              if [[ "${event_name}" == "workflow_dispatch" ]]; then
                release_sha="${existing_sha}"
                source_ref="${tag}"
              elif [[ "${existing_sha}" != "${GITHUB_SHA}" ]]; then
                echo "Tag ${tag} already exists at ${existing_sha}, not ${GITHUB_SHA}." >&2
                exit 1
              fi

              create_tag="false"
            fi
          fi

          echo "create_tag=${create_tag}" >>"${GITHUB_OUTPUT}"
          echo "release_sha=${release_sha}" >>"${GITHUB_OUTPUT}"
          echo "should_release=${should_release}" >>"${GITHUB_OUTPUT}"
          echo "source_ref=${source_ref}" >>"${GITHUB_OUTPUT}"
          echo "tag=${tag}" >>"${GITHUB_OUTPUT}"

  validate:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check:ts

      - name: Run test suite
        run: pnpm test:ts

      - name: Build workspace
        run: pnpm build:ts

      - name: Validate CLI version matches tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          version="$(node packages/cli/dist/cli/src/index.js --version)"
          tag="${{ needs.prepare.outputs.tag }}"

          if [[ -z "${version}" ]]; then
            echo "Could not determine built CLI version." >&2
            exit 1
          fi

          if [[ "${tag}" != "v${version}" ]]; then
            echo "Tag ${tag} does not match CLI version v${version}." >&2
            exit 1
          fi

          echo "tag=${tag}" >>"${GITHUB_OUTPUT}"
          echo "version=${version}" >>"${GITHUB_OUTPUT}"

  package:
    needs:
      - prepare
      - validate
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.source_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          run_install: false

      - name: Package source archive
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ needs.validate.outputs.tag }}"
          archive_name="polaris-${tag}-source.tar.gz"

          mkdir -p dist
          git archive --format=tar.gz --output="dist/${archive_name}" "${{ needs.prepare.outputs.source_ref }}"
          cp install.sh dist/install.sh
          chmod 0755 dist/install.sh

      - name: Smoke test installer from packaged source
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ needs.validate.outputs.tag }}"
          archive_name="polaris-${tag}-source.tar.gz"
          verify_dir="$(mktemp -d)"
          install_home="$(mktemp -d)"
          trap 'rm -rf "${verify_dir}" "${install_home}"' EXIT

          tar -xzf "dist/${archive_name}" -C "${verify_dir}"

          source_root="${verify_dir}"
          if [[ -d "${verify_dir}/cli" ]]; then
            source_root="${verify_dir}/cli"
          fi

          HOME="${install_home}" POLARIS_INSTALL_SOURCE_DIR="${source_root}" \
            bash dist/install.sh --install-dir "${install_home}/bin"

          HOME="${install_home}" "${install_home}/bin/polaris" --version | grep -Fx "${{ needs.validate.outputs.version }}"

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail

          cd dist
          sha256sum "polaris-${{ needs.validate.outputs.tag }}-source.tar.gz" install.sh > "polaris-${{ needs.validate.outputs.tag }}-checksums.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            dist/polaris-${{ needs.validate.outputs.tag }}-source.tar.gz
            dist/install.sh
            dist/polaris-${{ needs.validate.outputs.tag }}-checksums.txt
          if-no-files-found: error

  publish:
    needs:
      - prepare
      - validate
      - package
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-assets
          merge-multiple: true

      - name: Create release tag
        if: needs.prepare.outputs.create_tag == 'true'
        shell: bash
        run: |
          set -euo pipefail

          payload="$(mktemp)"
          trap 'rm -f "${payload}"' EXIT

          cat >"${payload}" <<EOF
          {
            "ref": "refs/tags/${{ needs.validate.outputs.tag }}",
            "sha": "${{ needs.prepare.outputs.release_sha }}"
          }
          EOF

          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs" \
            --data @"${payload}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/polaris-${{ needs.validate.outputs.tag }}-source.tar.gz
            dist/install.sh
            dist/polaris-${{ needs.validate.outputs.tag }}-checksums.txt
